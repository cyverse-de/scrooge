name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check

      - name: Format
        run: uv run ruff format --check

      - name: Type check
        run: uv run pyright

      # The suite is hermetic: local-filesystem fsspec and local DuckDB, no iRODS needed.
      - name: Test
        run: uv run pytest
